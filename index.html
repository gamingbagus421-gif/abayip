<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Dragon - IP Address Tracker</title>
    <!-- Leaflet CSS untuk Peta Interaktif -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #060b14;
            --card-bg: rgba(10, 20, 38, 0.85);
            --neon-blue: #00f3ff;
            --deep-blue: #0e2447;
            --text-light: #e2f1ff;
            --text-gray: #7a91b5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Latar Belakang Efek Cahaya Naga */
        body::before {
            content: "";
            position: absolute;
            top: -10%;
            right: -5%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Header & Tema Naga */
        header {
            background: linear-gradient(180deg, #091324 0%, rgba(6, 11, 20, 0) 100%);
            padding: 2.5rem 1rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: var(--text-light);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* Ornamen Naga */
        h1::before, h1::after {
            content: "🐉";
            font-size: 2rem;
            filter: drop-shadow(0 0 8px var(--neon-blue));
        }

        header p {
            color: var(--text-gray);
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* Form Pencarian */
        .search-container {
            margin: 1.5rem auto 0;
            max-width: 550px;
            display: flex;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(0, 243, 255, 0.3);
        }

        .search-container input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: none;
            outline: none;
            background: rgba(14, 36, 71, 0.9);
            color: #fff;
            font-size: 1rem;
        }

        .search-container input::placeholder {
            color: var(--text-gray);
        }

        .search-container button {
            background: linear-gradient(45deg, #00bfff, var(--neon-blue));
            color: var(--bg-color);
            border: none;
            padding: 0 1.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .search-container button:hover {
            background: linear-gradient(45deg, var(--neon-blue), #00bfff);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        /* Panel Informasi (Ditambahkan kolom kelima untuk ASN) */
        .info-panel {
            background: var(--card-bg);
            border: 1px solid rgba(0, 243, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            max-width: 1200px;
            width: 92%;
            margin: -2rem auto 2rem;
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 Kolom sejajar */
            gap: 1rem;
            position: relative;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .info-box {
            text-align: center;
            border-right: 1px solid rgba(122, 145, 181, 0.2);
            padding: 0 0.5rem;
        }

        .info-box:last-child {
            border-right: none;
        }

        /* Responsif untuk perangkat mobile / layar kecil */
        @media (max-width: 992deg) {
            .info-panel {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .info-box {
                border-right: none;
                border-bottom: 1px solid rgba(122, 145, 181, 0.2);
                padding-bottom: 1rem;
                padding-top: 0.5rem;
            }
            .info-box:last-child {
                border-bottom: none;
                padding-bottom: 0;
            }
            .info-panel {
                margin-top: 1rem;
            }
        }

        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-gray);
            letter-spacing: 2px;
            margin-bottom: 0.4rem;
        }

        .info-data {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-light);
            word-wrap: break-word;
        }

        /* Area Peta */
        #map {
            flex: 1;
            width: 100%;
            min-height: 450px;
            z-index: 1;
            border-top: 2px solid rgba(0, 243, 255, 0.2);
        }

        /* Kustomisasi Tampilan Peta Gelap/Aesthetic */
        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out {
            filter: invert(100%) hue-rotate(190deg) brightness(95%) contrast(90%);
        }
    </style>
</head>
<body>

    <header>
        <h1>Azure Dragon</h1>
        <p>Aesthetic IP Address Tracker & Geolocation</p>
        
        <div class="search-container">
            <input type="text" id="ip-input" placeholder="Masukkan IP Address (Contoh: 8.8.8.8)...">
            <button id="search-btn">SEEK</button>
        </div>
    </header>

    <div class="info-panel">
        <div class="info-box">
            <div class="info-label">IP Address</div>
            <div class="info-data" id="info-ip">Memuat...</div>
        </div>
        <div class="info-box">
            <div class="info-label">Lokasi</div>
            <div class="info-data" id="info-location">Memuat...</div>
        </div>
        <div class="info-box">
            <div class="info-label">Zona Waktu</div>
            <div class="info-data" id="info-timezone">Memuat...</div>
        </div>
        <div class="info-box">
            <div class="info-label">Provider (ISP)</div>
            <div class="info-data" id="info-isp">Memuat...</div>
        </div>
        <!-- Tambahan Kolom ASN -->
        <div class="info-box">
            <div class="info-label">ASN</div>
            <div class="info-data" id="info-asn" style="color: var(--neon-blue);">Memuat...</div>
        </div>
    </div>

    <!-- Container untuk Peta -->
    <div id="map"></div>

    <!-- Leaflet JS untuk Peta -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Inisialisasi Peta Dunia Default awal (titik tengah 0,0)
        const map = L.map('map').setView([0, 0], 2);
        
        // Menggunakan tile OpenStreetMap gratis
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Custom Marker Neon Blue
        const customIcon = L.divIcon({
            className: 'custom-marker',
            html: `<div style="background-color: #00f3ff; width: 16px; height: 16px; border-radius: 50%; box-shadow: 0 0 12px #00f3ff; border: 2px solid #fff;"></div>`,
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        let marker = L.marker([0, 0], {icon: customIcon}).addTo(map);

        // Fungsi Utama Melacak IP beserta data ASN
        async function trackIP(ipAddress = '') {
            const url = `https://ipwho.is/${ipAddress}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Koneksi bermasalah');
                
                const data = await response.json();
                
                // Jika input IP tidak valid/fail
                if (data.success === false) {
                    alert(`Gagal: ${data.message || 'IP tidak valid'}`);
                    return;
                }

                // Update data teks ke UI
                document.getElementById('info-ip').innerText = data.ip || '-';
                document.getElementById('info-location').innerText = `${data.city || ''}, ${data.region || ''}, ${data.country || '-'}`;
                document.getElementById('info-timezone').innerText = data.timezone?.id || '-';
                document.getElementById('info-isp').innerText = data.connection?.isp || '-';
                
                // Mengambil nomor ASN secara akurat dari objek data.connection.asn
                document.getElementById('info-asn').innerText = data.connection?.asn ? `AS${data.connection.asn}` : '-';

                // Ambil koordinat GPS
                const lat = data.latitude;
                const lon = data.longitude;

                if (lat && lon) {
                    // Pindahkan titik peta dan ganti fokus kamera
                    map.setView([lat, lon], 13);
                    marker.setLatLng([lat, lon]);
                    marker.bindPopup(`<b>Naga Azure Menemukan Posisi!</b><br>${data.city}, ${data.country}<br><small>ASN: AS${data.connection?.asn || '-'}</small>`).openPopup();
                }

            } catch (error) {
                console.error('Error fetching data:', error);
                alert('Terjadi kesalahan jaringan atau API sedang sibuk. Silakan coba lagi.');
            }
        }

        // Event saat tombol "SEEK" diklik
        document.getElementById('search-btn').addEventListener('click', () => {
            const ipValue = document.getElementById('ip-input').value.trim();
            trackIP(ipValue);
        });

        // Event saat menekan tombol "Enter" di kolom input
        document.getElementById('ip-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const ipValue = document.getElementById('ip-input').value.trim();
                trackIP(ipValue);
            }
        });

        // Melacak IP pengguna otomatis saat pertama kali web dibuka
        window.addEventListener('DOMContentLoaded', () => {
            trackIP();
        });
    </script>
</body>
</html>
