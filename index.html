<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA IP-SYNC - IP Address Tracker</title>
    <!-- Leaflet CSS untuk Peta Interaktif -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts untuk nuansa Sci-Fi & Modern -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f3ff;
            --cyber-blue: #00a8ff;
            --dark-space: #030812;
            --panel-bg: rgba(6, 17, 33, 0.75);
            --border-blue: rgba(0, 243, 255, 0.4);
            --text-light: #e2f1ff;
            --text-gray: #8ba3c7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--dark-space);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            padding: 2rem 1rem;
            position: relative;
        }

        /* Live Snow Background Canvas */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Nebula & City Glow Effect Behind Everything */
        .nebula-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120vw;
            height: 120vh;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 168, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 243, 255, 0.1) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* Wrapper Konten Utama */
        .main-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        /* Bagian Logo Naga Siber */
        .logo-section {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        /* Gambar Naga SVG Custom Bergaya Futuristik */
        .dragon-icon {
            width: 120px;
            height: 120px;
            filter: drop-shadow(0 0 15px rgba(0, 243, 255, 0.8));
            margin-bottom: 0.5rem;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo-section h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.6), 0 0 20px rgba(0, 168, 255, 0.3);
        }

        .logo-section p {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 5px;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-top: 0.2rem;
        }

        /* Konsol / Panel Utama Bergaya Gambar (Glassmorphism & Cyber Outline) */
        .cyber-console {
            width: 100%;
            background: var(--panel-bg);
            border: 2px solid var(--border-blue);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 0 35px rgba(0, 243, 255, 0.15), inset 0 0 20px rgba(0, 243, 255, 0.1);
            backdrop-filter: blur(12px);
            position: relative;
        }

        /* Ornamen Sudut Mekanis Khas Antarmuka Fiksi Ilmiah */
        .cyber-console::before, .cyber-console::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--neon-blue);
            border-style: solid;
            pointer-events: none;
        }
        .cyber-console::before { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-top-left-radius: 16px; }
        .cyber-console::after { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-bottom-right-radius: 16px; }

        /* Form Input Bar di dalam Konsol */
        .search-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            width: 100%;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(3, 12, 26, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            padding: 0.9rem 1.2rem;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.4);
        }

        .search-row button {
            background: linear-gradient(135deg, rgba(0, 168, 255, 0.4), rgba(0, 243, 255, 0.2));
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 0 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px var(--neon-blue);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-row button:hover {
            background: var(--neon-blue);
            color: var(--dark-space);
            box-shadow: 0 0 15px var(--neon-blue);
            text-shadow: none;
        }

        /* Baris Grid Data Hasil IP */
        .data-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 2rem;
            background: rgba(3, 12, 26, 0.4);
            padding: 1.2rem;
            border-radius: 8px;
            border: 1px solid rgba(0, 243, 255, 0.1);
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(0, 243, 255, 0.05);
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--text-gray);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .data-value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.15rem;
            color: var(--neon-blue);
            text-align: right;
            text-shadow: 0 0 4px rgba(0, 243, 255, 0.3);
        }

        /* Wadah Peta Siber Klasik */
        .map-wrapper {
            width: 100%;
            height: 320px;
            border-radius: 8px;
            border: 1px solid var(--border-blue);
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Filter CSS untuk membalik warna Peta Leaflet standard menjadi Biru Siber / Blueprint */
        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out {
            filter: invert(95%) hue-rotate(195deg) brightness(85%) contrast(110%) saturate(140%);
        }

        /* Kustomisasi Marker */
        .cyber-marker {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .marker-pulse {
            width: 14px;
            height: 14px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-blue);
            border: 2px solid #fff;
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 243, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0); }
        }

        @media (max-width: 600px) {
            .search-row { flex-direction: column; }
            .search-row button { padding: 0.9rem; justify-content: center; }
            .logo-section h1 { font-size: 1.7rem; }
            .logo-section p { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- Animasi Live Turun Salju -->
    <canvas id="snow-canvas"></canvas>
    
    <!-- Efek Pendaran Latar Belakang -->
    <div class="nebula-glow"></div>

    <div class="main-container">
        
        <!-- Judul & Logo Naga -->
        <div class="logo-section">
            <!-- Vektor Naga Siber Ornamen Menggunakan Inline SVG -->
            <svg class="dragon-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50,15 C40,25 25,20 20,35 C15,45 28,50 30,60 C32,70 20,80 35,85 C45,88 55,88 65,85 C80,80 68,70 70,60 C72,50 85,45 80,35 C75,20 60,25 50,15 Z" fill="none" stroke="#00f3ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M50,25 C45,32 35,30 32,40 C29,48 38,52 38,60 C38,66 30,72 40,76 C46,78 54,78 60,76 C70,72 62,66 62,60 C62,52 71,48 68,40 C65,30 55,32 50,25 Z" fill="none" stroke="#00a8ff" stroke-width="1.5"/>
                <circle cx="42" cy="45" r="2" fill="#00f3ff"/>
                <circle cx="58" cy="45" r="2" fill="#00f3ff"/>
                <path d="M46,55 Q50,58 54,55" fill="none" stroke="#00f3ff" stroke-width="1.5"/>
                <!-- Detail Sayap Ornamen -->
                <path d="M25,30 Q10,20 5,40 Q15,42 22,38" fill="none" stroke="#00f3ff" stroke-width="1"/>
                <path d="M75,30 Q90,20 95,40 Q85,42 78,38" fill="none" stroke="#00f3ff" stroke-width="1"/>
            </svg>
            <h1>NEBULA IP-SYNC</h1>
            <p>IP Address Tracker</p>
        </div>

        <!-- Konsol Pengendali Utama -->
        <div class="cyber-console">
            
            <!-- Kolom Pencarian -->
            <div class="search-row">
                <div class="input-wrapper">
                    <input type="text" id="ip-search" placeholder="ENTER IP ADDRESS (e.g. 8.8.8.8)...">
                </div>
                <button id="btn-track">TRACK IP ⚡</button>
            </div>

            <!-- Tampilan Data Monitor -->
            <div class="data-grid">
                <div class="data-row">
                    <span class="data-label">IP Address:</span>
                    <span class="data-value" id="res-ip">LOADING...</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Location:</span>
                    <span class="data-value" id="res-location">LOADING...</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Timezone:</span>
                    <span class="data-value" id="res-timezone">LOADING...</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Provider (ISP):</span>
                    <span class="data-value" id="res-isp">LOADING...</span>
                </div>
                <div class="data-row">
                    <span class="data-label">ASN:</span>
                    <span class="data-value" id="res-asn">LOADING...</span>
                </div>
            </div>

            <!-- Panel Peta Siber -->
            <div class="map-wrapper">
                <div id="map"></div>
            </div>

        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- 1. ENGINE ANIMASI TURUN SALJU (LIVE CANVAS) ---
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let flakes = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createFlakes() {
            const maxFlakes = 110; 
            flakes = [];
            for (let i = 0; i < maxFlakes; i++) {
                flakes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2.5 + 0.5, // Ukuran butiran salju
                    d: Math.random() * maxFlakes,
                    speed: Math.random() * 1 + 0.3
                });
            }
        }

        function drawFlakes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 243, 255, 0.6)"; // Salju berwarna biru siber transparan
            ctx.beginPath();
            for (let i = 0; i < flakes.length; i++) {
                const f = flakes[i];
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
            }
            ctx.fill();
            moveFlakes();
        }

        function moveFlakes() {
            for (let i = 0; i < flakes.length; i++) {
                const f = flakes[i];
                f.y += f.speed;
                f.x += Math.sin(f.d) * 0.4;

                // Jika salju mencapai batas bawah, ulangi dari atas
                if (f.y > canvas.height) {
                    flakes[i] = { x: Math.random() * canvas.width, y: 0, r: f.r, d: f.d, speed: f.speed };
                }
            }
        }

        createFlakes();
        setInterval(drawFlakes, 25);


        // --- 2. ENGINE PELACAK IP & PETA INTERAKTIF ---
        // Inisialisasi peta dunia blueprint siber
        const map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Custom Marker Pulsa Siber Neon
        const cyberIcon = L.divIcon({
            className: 'cyber-marker',
            html: '<div class="marker-pulse"></div>',
            iconSize: [14, 14],
            iconAnchor: [7, 7]
        });

        let currentMarker = L.marker([0, 0], { icon: cyberIcon }).addTo(map);

        // Menggunakan API ipwho.is (Akurat, Gratis, Tanpa Token, Mendukung HTTPS)
        async function fetchIPData(targetIP = '') {
            try {
                const response = await fetch(`https://ipwho.is/${targetIP}`);
                if (!response.ok) throw new Error('Network failure');
                
                const data = await response.json();

                if (data.success === false) {
                    alert(`ERROR: ${data.message || 'Alamat IP Tidak Valid'}`);
                    return;
                }

                // Update teks visual monitor
                document.getElementById('res-ip').innerText = data.ip || '-';
                document.getElementById('res-location').innerText = `${data.city || ''}, ${data.region || ''}, ${data.country || '-'}`;
                document.getElementById('res-timezone').innerText = data.timezone?.id || '-';
                document.getElementById('res-isp').innerText = data.connection?.isp || '-';
                document.getElementById('res-asn').innerText = data.connection?.asn ? `AS${data.connection.asn}` : '-';

                // Koordinat Lokasi Geografis
                const latitude = data.latitude;
                const longitude = data.longitude;

                if (latitude && longitude) {
                    map.setView([latitude, longitude], 12);
                    currentMarker.setLatLng([latitude, longitude]);
                }

            } catch (err) {
                console.error(err);
                alert('Sistem Gagal Menghubungi Pemancar Satelit API.');
            }
        }

        // Kontrol Tombol dan Input Enter
        document.getElementById('btn-track').addEventListener('click', () => {
            const ipVal = document.getElementById('ip-search').value.trim();
            fetchIPData(ipVal);
        });

        document.getElementById('ip-search').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const ipVal = document.getElementById('ip-search').value.trim();
                fetchIPData(ipVal);
            }
        });

        // Jalankan pelacakan IP otomatis milik klien saat sistem dimulai pertama kali
        window.addEventListener('DOMContentLoaded', () => {
            fetchIPData();
        });
    </script>
</body>
</html>
