<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber IP Tracker - Futuristic Glow</title>
    <!-- Menggunakan Bootstrap 5 untuk struktur dasar -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Menggunakan font monospace agar terlihat teknis */
        body {
            background-color: #0d1117; /* Latar belakang gelap */
            color: #c9d1d9; /* Warna teks dasar terang */
            font-family: 'Courier New', Courier, monospace;
            padding-top: 50px;
            overflow-x: hidden;
        }

        /* Latar belakang dinamis */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 123, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(220, 53, 69, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        /* Gaya Kartu Utama */
        .card {
            background-color: rgba(22, 27, 34, 0.9); /* Transparansi sedikit */
            border: 2px solid transparent;
            border-image: linear-gradient(to bottom right, #007bff, #dc3545, #007bff);
            border-image-slice: 1;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.3); /* Neon glow biru */
            backdrop-filter: blur(5px);
            transition: box-shadow 0.3s ease-in-out;
        }

        .card:hover {
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.5), 0 0 10px rgba(220, 53, 69, 0.2);
        }

        /* Judul Futuristik */
        h2.text-primary {
            color: #00f2fe !important; /* Biru Neon cerah */
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe;
            animation: pulse-blue 2s infinite;
        }

        /* Input Field */
        .form-control {
            background-color: #161b22;
            border: 1px solid #30363d;
            color: #00f2fe;
            font-family: inherit;
        }

        .form-control:focus {
            background-color: #0d1117;
            border-color: #00f2fe;
            color: #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        /* Tombol 'Lacak IP' - Merah Neon */
        .btn-primary {
            background-image: linear-gradient(45deg, #007bff 0%, #00f2fe 100%);
            border: none;
            color: #0d1117;
            font-weight: bold;
            transition: all 0.3s ease-in-out;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }

        .btn-primary:hover {
            background-image: linear-gradient(45deg, #dc3545 0%, #ffc107 100%);
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.8);
            transform: scale(1.05);
        }

        /* Tabel Hasil */
        .result-table {
            background-color: transparent;
            color: #c9d1d9;
            border-color: #30363d;
        }

        .result-table th {
            width: 35%;
            color: #c9d1d9;
            text-transform: uppercase;
            font-size: 0.9rem;
            border-color: #30363d;
        }

        .result-table td {
            color: #00f2fe;
            border-color: #30363d;
        }

        /* Warna Teks Spesifik */
        #resIp {
            color: #00f2fe !important; /* Biru Neon */
            text-shadow: 0 0 5px #00f2fe;
        }

        #resAsn {
            color: #dc3545 !important; /* Merah Neon */
            text-shadow: 0 0 5px #dc3545;
        }

        /* Spinner Loading */
        .spinner-border {
            border-color: transparent;
            border-top-color: #00f2fe;
            border-left-color: #00f2fe;
            filter: drop-shadow(0 0 5px #00f2fe);
        }

        /* Animasi Pulsing untuk Judul */
        @keyframes pulse-blue {
            0% { text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe; }
            50% { text-shadow: 0 0 15px #00f2fe, 0 0 25px #00f2fe, 0 0 35px #00f2fe; }
            100% { text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe; }
        }

        /* Responsif untuk Layar Kecil */
        @media (max-width: 576px) {
            body { padding-top: 20px; }
            .card { padding: 1.5rem !important; }
            h2.text-primary { font-size: 1.5rem; }
            .input-group { flex-direction: column; }
            .input-group * { width: 100% !important; border-radius: 0.25rem !important; margin-bottom: 5px;}
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="card p-5 mb-4">
                <h2 class="text-center mb-4 text-primary">Cyber IP Tracker</h2>
                
                <!-- Input untuk melacak IP spesifik -->
                <div class="input-group mb-4">
                    <input type="text" id="ipInput" class="form-control" placeholder="Masukkan IP Address (Contoh: 8.8.8.8) atau kosongkan untuk IP Anda">
                    <button class="btn btn-primary" type="button" id="trackBtn">Lacak IP</button>
                </div>
                
                <!-- Area Loading -->
                <div id="loading" class="text-center d-none my-4">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Memuat data...</span>
                    </div>
                    <p class="mt-3 text-muted">Sedang mendekripsi koordinat...</p>
                </div>

                <!-- Area Error -->
                <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

                <!-- Area Hasil -->
                <div id="resultArea" class="d-none">
                    <h4 class="mb-3 text-secondary text-center text-uppercase" style="font-size: 1rem; letter-spacing: 1px;">Data Jaringan:</h4>
                    <table class="table table-bordered result-table">
                        <tbody>
                            <tr>
                                <th>IP Address</th>
                                <td id="resIp" class="fw-bold"></td>
                            </tr>
                            <tr>
                                <th>ASN</th>
                                <td id="resAsn" class="fw-bold"></td>
                            </tr>
                            <tr>
                                <th>Provider / ISP</th>
                                <td id="resOrg"></td>
                            </tr>
                            <tr>
                                <th>Kota</th>
                                <td id="resCity"></td>
                            </tr>
                            <tr>
                                <th>Wilayah/Provinsi</th>
                                <td id="resRegion"></td>
                            </tr>
                            <tr>
                                <th>Negara</th>
                                <td id="resCountry"></td>
                            </tr>
                            <tr>
                                <th>Koordinat (Lat, Long)</th>
                                <td id="resCoords"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const ipInput = document.getElementById("ipInput");
        const trackBtn = document.getElementById("trackBtn");
        const loading = document.getElementById("loading");
        const errorAlert = document.getElementById("errorAlert");
        const resultArea = document.getElementById("resultArea");

        // Fungsi untuk mengambil data IP
        async function trackIP(ip = "") {
            // Reset tampilan
            loading.classList.remove("d-none");
            errorAlert.classList.add("d-none");
            resultArea.classList.add("d-none");

            // Jika ip kosong, API otomatis mendeteksi IP pengguna saat ini
            const url = ip ? `https://ipapi.co/${ip}/json/` : `https://ipapi.co/json/`;

            try {
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error("Gagal terhubung ke jaringan neural.");
                }

                const data = await response.json();

                // Jika API mengembalikan error (misal format IP salah)
                if (data.error) {
                    throw new Error(data.reason || "Format IP tidak valid atau tidak ditemukan.");
                }

                // Tampilkan data ke tabel
                document.getElementById("resIp").textContent = data.ip || "-";
                document.getElementById("resAsn").textContent = data.asn || "-";
                document.getElementById("resOrg").textContent = data.org || "-";
                document.getElementById("resCity").textContent = data.city || "-";
                document.getElementById("resRegion").textContent = data.region || "-";
                document.getElementById("resCountry").textContent = `${data.country_name} (${data.country_code})`;
                document.getElementById("resCoords").textContent = `${data.latitude}, ${data.longitude}`;

                // Munculkan area hasil
                resultArea.classList.remove("d-none");

            } catch (error) {
                errorAlert.textContent = `Error: ${error.message}`;
                errorAlert.classList.remove("d-none");
            } finally {
                loading.classList.add("d-none");
            }
        }

        // Jalankan pelacakan IP pengguna saat halaman pertama kali dimuat
        trackIP();

        // Jalankan pelacakan saat tombol diklik
        trackBtn.addEventListener("click", () => {
            const targetIP = ipInput.value.trim();
            trackIP(targetIP);
        });

        // Jalankan pelacakan saat menekan tombol Enter di input
        ipInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                const targetIP = ipInput.value.trim();
                trackIP(targetIP);
            }
        });
    });
</script>

</body>
</html>
